{% extends "admin/base.html" %}
{% block content %}
<h3 class="mb-4">سوالات متداول</h3>

<div class="card p-3 mb-4">
    <h5>افزودن سوال جدید</h5>
    <form method="POST" class="row g-2">
        <div class="col-md-5"><input name="question" class="form-control" placeholder="سوال" required></div>
        <div class="col-md-5"><input name="answer" class="form-control" placeholder="پاسخ" required></div>
        <div class="col-md-2"><button class="btn btn-dark w-100">افزودن</button></div>
    </form>
</div>

<table class="table table-bordered table-hover bg-white">
    <thead><tr><th>#</th><th>سوال</th><th>پاسخ</th><th>فعال</th><th>عملیات</th><th></th></tr></thead>
    <tbody>
        {% for faq in faqs %}
        <tr>
            <form method="POST" action="{{ url_for('admin_panel.update_faq', faq_id=faq.id) }}">
            <td>{{ faq.id }}</td>
            <td><input name="question" value="{{ faq.question }}" class="form-control form-control-sm"></td>
            <td><input name="answer" value="{{ faq.answer }}" class="form-control form-control-sm"></td>
            <td><input type="checkbox" name="is_active" {% if faq.is_active %}checked{% endif %}></td>
            <td><button class="btn btn-sm btn-dark">ذخیره</button></td>
            </form>
            <td>
                <form method="POST" action="{{ url_for('admin_panel.delete_faq', faq_id=faq.id) }}" onsubmit="return confirm('غیرفعال شود؟');">
                    <button class="btn btn-sm btn-outline-danger">غیرفعال</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="6" class="text-center">سوالی ثبت نشده است</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
